---
- summary: |
    проверка создаия новой игры
  requirement: |
    при нажатии на кнопку "создать битву" создаётся новая игра
  prerequisites: |
    пользователь авторизирован
    открыта глваная страница сайта игры
  test-data: |
    логин и пароль зарегистрированного пользователя
  steps:
    - нажать кнопку "создать битву"
    - выбрать уровень сложности (level)
    - выбрать тип игры (game type)
    - установить лимит времени (Time control)
    - выбрать задачу по названию или тегу (Choose task by name or tags)
    - нажать кнопку "Create battle"
  expected-result: |
    создана новая игра

- summary: |
    проверка возможности присоединиться к созданной игре
  requirement: |
    при нажатии на кнопку "присоединиться к битве" пользователь может присоединится к игре
  prerequisites: |
    пользователь авторизирован
    открыта главная сраница сайта игры
  test-data: |
    логин и пароль зарегистрированного пользователя
  steps:
    - нажать кнопку "присоединиться к битве"
    - выбрать игру
    - нажать кнопку "сражаться"
  expected-result: |
    начинается игра

- summary: |
    проверка совместимости с последними версиями браузеров
  requirement: |
    проверить совместимость с браузерами
  prerequisites: |
    установлены браузеры Edge, FireFox, Chrome, Opera, Yandex
  test-data: |
    https://codebattle.hexlet.io/ - стартовая страница проекта
  steps:
    открыть стартовую страницу в разных браузерах
  expected-result: |
    страница корректно отображается и работает в разных браузерах

- summary: |
    Проверка загрузки сайта по HTTPS
  requirement: |
    Сайт передаётся по HTTPS
  prerequisites: |
    открыта главная страница сайта
  test-data: |
    https://codebattle.hexlet.io/ - стартовая страница проекта
  steps:
    - открыть полный адрес сайта
  expected-result: |
    Адрес начинается с HTTPS
